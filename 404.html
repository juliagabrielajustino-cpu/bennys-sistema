<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Página não encontrada | Benny's System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{

            display:flex;
            justify-content:center;
            align-items:center;

            min-height:100vh;

            background:#111;

            color:white;

        }

        .card{

            width:90%;
            max-width:600px;

            text-align:center;

            padding:50px;

            background:#181818;

            border:1px solid #303030;

            border-radius:18px;

        }

        h1{

            font-size:90px;

            color:#d50000;

        }

        h2{

            margin-top:10px;

            font-size:30px;

        }

        p{

            margin-top:20px;

            color:#bdbdbd;

            line-height:28px;

        }

        a{

            display:inline-block;

            margin-top:35px;

            padding:14px 28px;

            background:#d50000;

            color:white;

            text-decoration:none;

            border-radius:10px;

            font-weight:bold;

            transition:.2s;

        }

        a:hover{

            background:#ff2f2f;

            transform:translateY(-2px);

        }

    </style>

</head>

<body>

    <div class="card">

        <h1>404</h1>

        <h2>Página não encontrada</h2>

        <p>

            A página que você tentou acessar não existe
            ou foi movida.

        </p>

        <a href="index.html">

            Voltar ao Login

        </a>

    </div>

</body>

</html>
